name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend: Lint + Test
  backend:
    name: Backend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["22.x"]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage --forceExit
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_URI: mongodb://localhost:27017/enterprise-ecommerce-test
          JWT_SECRET: ci-test-jwt-secret-at-least-32-characters-long
          JWT_EXPIRE: 7d
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
          JWT_REFRESH_EXPIRE: 30d
          FRONTEND_URL: http://localhost:5173
          BCRYPT_SALT_ROUNDS: 4
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder

      - name: Upload backend coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Frontend: Lint + Test + Build
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["22.x"]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run --coverage
        env:
          VITE_API_BASE_URL: http://localhost:5001/api
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:5001/api
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Upload frontend coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
